{{- if .Values.dapr.enabled }}
{{- if not (lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "components.dapr.io") }}
{{- fail "Dapr CRDs not found. Run 'dapr init -k' before deploying with dapr.enabled=true" }}
{{- end }}
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: {{ .Values.dapr.cronBinding.name | default "cron-reminder-processor" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dapr.cronBinding.type | default "bindings.cron" }}
  version: {{ .Values.dapr.cronBinding.version | default "v1" }}
  metadata:
    {{- range .Values.dapr.cronBinding.metadata }}
    - name: {{ .name }}
      value: {{ .value | quote }}
    {{- end }}
  # Scope to reminder-service only
  scopes:
    - reminder-service
{{- end }}
