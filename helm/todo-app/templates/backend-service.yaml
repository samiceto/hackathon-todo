# Backend Service
# Helm template for exposing backend API within the cluster
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app.fullname" . }}-backend
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type | default "ClusterIP" }}
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
    {{- if and (eq .Values.backend.service.type "NodePort") .Values.backend.service.nodePort }}
    nodePort: {{ .Values.backend.service.nodePort }}
    {{- end }}
  selector:
    {{- include "todo-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend

  # Session affinity (optional, for stateful operations)
  sessionAffinity: None

  # IP family policy
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
