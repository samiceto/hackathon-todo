name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - 005-step-5-cloud-deployment
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # ── Backend ──────────────────────────────────────
      - name: Build and push backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:latest \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:${{ github.sha }} \
            ./backend/api/
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Dapr Components ───────────────────────────────
      - name: Get Container Apps Environment name
        id: aca-env
        run: |
          ENV_ID=$(az containerapp show \
            --name todo-backend \
            --resource-group todoapp \
            --query properties.environmentId -o tsv)
          ENV_NAME="${ENV_ID##*/}"
          echo "name=$ENV_NAME" >> $GITHUB_OUTPUT

      - name: Register Dapr pubsub component (Azure Service Bus)
        run: |
          cat > /tmp/pubsub-component.yaml << 'EOF'
          componentType: pubsub.azure.servicebus.topics
          version: v1
          metadata:
            - name: connectionString
              value: "PLACEHOLDER_SB_CONNECTION"
          scopes:
            - todo-backend
            - todo-reminder-service
          EOF
          # Replace placeholder with actual secret value
          sed -i "s|PLACEHOLDER_SB_CONNECTION|${{ secrets.SERVICE_BUS_CONNECTION_STRING }}|g" /tmp/pubsub-component.yaml
          az containerapp env dapr-component set \
            --name ${{ steps.aca-env.outputs.name }} \
            --resource-group todoapp \
            --dapr-component-name pubsub-kafka \
            --yaml /tmp/pubsub-component.yaml

      - name: Register Dapr cron binding component
        run: |
          cat > /tmp/cron-component.yaml << 'EOF'
          componentType: bindings.cron
          version: v1
          metadata:
            - name: schedule
              value: "@every 1m"
          scopes:
            - todo-reminder-service
          EOF
          az containerapp env dapr-component set \
            --name ${{ steps.aca-env.outputs.name }} \
            --resource-group todoapp \
            --dapr-component-name cron-reminder-processor \
            --yaml /tmp/cron-component.yaml

      # ── Deploy Backend with Dapr ──────────────────────
      - name: Deploy backend image and env vars
        env:
          IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: |
          IMAGE="${IMAGE//$'\n'/}"
          DATABASE_URL="${DATABASE_URL//$'\n'/}"
          OPENAI_API_KEY="${OPENAI_API_KEY//$'\n'/}"
          BETTER_AUTH_SECRET="${BETTER_AUTH_SECRET//$'\n'/}"
          az containerapp update \
            --name todo-backend \
            --resource-group todoapp \
            --image "$IMAGE" \
            --set-env-vars \
              "DATABASE_URL=$DATABASE_URL" \
              "OPENAI_API_KEY=$OPENAI_API_KEY" \
              "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET"

      - name: Enable Dapr on backend
        run: |
          az containerapp dapr enable \
            --name todo-backend \
            --resource-group todoapp \
            --dapr-app-id todo-backend \
            --dapr-app-port 8000 \
            --dapr-app-protocol http

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(az containerapp show \
            --name todo-backend \
            --resource-group todoapp \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      # ── Frontend ─────────────────────────────────────
      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }} \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:latest \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:${{ github.sha }} \
            ./frontend/
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:${{ github.sha }}

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name todo-frontend \
            --resource-group todoapp \
            --image ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:${{ github.sha }}

      # ── Reminder Service ──────────────────────────────
      - name: Build and push reminder-service image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/todo-reminder-service:latest \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/todo-reminder-service:${{ github.sha }} \
            ./backend/reminder-service/
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/todo-reminder-service:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/todo-reminder-service:${{ github.sha }}

      - name: Deploy reminder-service
        env:
          IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/todo-reminder-service:${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACA_ENV_NAME: ${{ steps.aca-env.outputs.name }}
        run: |
          IMAGE="${IMAGE//$'\n'/}"
          DATABASE_URL="${DATABASE_URL//$'\n'/}"
          ACA_ENV_NAME="${ACA_ENV_NAME//$'\n'/}"
          if az containerapp show --name todo-reminder-service --resource-group todoapp &>/dev/null; then
            az containerapp update \
              --name todo-reminder-service \
              --resource-group todoapp \
              --image "$IMAGE" \
              --set-env-vars \
                "DATABASE_URL=$DATABASE_URL" \
                "DAPR_PUBSUB_NAME=pubsub-kafka" \
                "LOG_LEVEL=INFO"
          else
            az containerapp create \
              --name todo-reminder-service \
              --resource-group todoapp \
              --environment "$ACA_ENV_NAME" \
              --image "$IMAGE" \
              --target-port 8001 \
              --ingress internal \
              --min-replicas 1 \
              --max-replicas 1 \
              --env-vars \
                "DATABASE_URL=$DATABASE_URL" \
                "DAPR_PUBSUB_NAME=pubsub-kafka" \
                "LOG_LEVEL=INFO" \
              --enable-dapr \
              --dapr-app-id todo-reminder-service \
              --dapr-app-port 8001 \
              --dapr-app-protocol http
          fi

      - name: Enable Dapr on reminder-service
        run: |
          az containerapp dapr enable \
            --name todo-reminder-service \
            --resource-group todoapp \
            --dapr-app-id todo-reminder-service \
            --dapr-app-port 8001 \
            --dapr-app-protocol http
