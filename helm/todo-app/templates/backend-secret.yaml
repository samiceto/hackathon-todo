# Backend Secret
# Helm template for storing sensitive backend configuration
# SECURITY WARNING: Actual secret values MUST be provided at deployment time via --set flags
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-app.fullname" . }}-backend-secrets
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # OpenAI API Key (required for AI chatbot functionality)
  # Provide at deploy time: --set backend.secrets.openaiApiKey="sk-..."
  OPENAI_API_KEY: {{ .Values.backend.secrets.openaiApiKey | required "backend.secrets.openaiApiKey is required" }}

  # Better Auth Secret (required for JWT token verification)
  # Must match the secret used by frontend Better Auth configuration
  # Provide at deploy time: --set backend.secrets.betterAuthSecret="<secret>"
  BETTER_AUTH_SECRET: {{ .Values.backend.secrets.betterAuthSecret | required "backend.secrets.betterAuthSecret is required" }}

  # Database Password (if not included in DATABASE_URL in ConfigMap)
  # Only needed if separating DB credentials from connection string
  {{- if .Values.backend.secrets.databasePassword }}
  DATABASE_PASSWORD: {{ .Values.backend.secrets.databasePassword }}
  {{- end }}
